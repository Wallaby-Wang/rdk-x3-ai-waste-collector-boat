<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Laker &#x5de6;&#x4fa7;&#x76d1;&#x6d4b;&#x5927;&#x5c4f; UI &#x7cbe;&#x786e;&#x63d0;&#x53d6;</title>
  <style>

    :root {
      color-scheme: light;
      --bg: #f5f8fd;
      --surface: #ffffff;
      --surface-soft: #f8fbff;
      --line: #dfe8f5;
      --line-strong: #c9d8ea;
      --ink: #081b3d;
      --muted: #657895;
      --blue: #1475ff;
      --blue-2: #0d5bd7;
      --green: #09b64f;
      --boat-green: #10bf62;
      --boat-green-dark: #058441;
      --boat-green-soft: #dff9ea;
      --red: #f01822;
      --yellow: #f4c400;
      --orange: #ff8b12;
      --purple: #9255ff;
      --shadow: 0 8px 14px rgba(28, 62, 112, 0.08);
      --shadow-strong: 0 12px 16px rgba(23, 55, 105, 0.14);
      --radius: 16px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 16% 12%, rgba(20, 117, 255, 0.08), transparent 32%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 52%, #eef4fb 100%);
      color: var(--ink);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    button, input {
      font: inherit;
    }

    button {
      color: inherit;
      cursor: pointer;
    }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-rows: 78px minmax(0, 1fr);
      gap: 14px;
      padding: 18px 20px 18px;
    }

    .topbar {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .brand-logo {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: block;
      object-fit: cover;
      box-shadow: 0 6px 12px rgba(20, 117, 255, 0.14);
      flex: 0 0 auto;
      background: #fff;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.15;
      font-weight: 900;
      color: #071946;
      letter-spacing: 0.005em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-status {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: #3d5275;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 4px 8px rgba(20, 48, 91, 0.06);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 0 4px rgba(255, 139, 18, 0.14);
    }

    .dot.ok {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(9, 182, 79, 0.14);
    }

    .dot.bad {
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(240, 24, 34, 0.14);
    }

    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
    }

    .left-stack {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 170px minmax(0, 1fr) 96px;
      gap: 14px;
    }

    .summary-card,
    .video-card,
    .bottom-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    .summary-card {
      display: grid;
      grid-template-columns: minmax(210px, 1fr) 1px minmax(210px, 0.82fr) 1px minmax(210px, 0.82fr);
      align-items: stretch;
      overflow: hidden;
    }

    .divider {
      width: 1px;
      height: 70%;
      align-self: center;
      background: var(--line);
    }

    .course-box {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr) 150px;
      align-items: center;
      gap: 22px;
      padding: 24px 28px;
    }

    .nav-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 2px solid rgba(20, 117, 255, 0.22);
      color: var(--blue);
      background: #fff;
    }

    .nav-icon svg {
      width: 40px;
      height: 40px;
      stroke-width: 2.8;
    }

    .summary-label,
    .metric-label,
    .panel-title,
    .motor-title {
      color: #233b65;
      font-weight: 800;
      line-height: 1.15;
    }

    .summary-label {
      margin-bottom: 12px;
      font-size: 15px;
    }

    .summary-action {
      min-width: 0;
      font-size: 29px;
      line-height: 1.1;
      font-weight: 900;
      color: var(--blue);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .course-copy {
      min-width: 0;
    }

    .nav-visual {
      width: 150px;
      height: 92px;
      justify-self: end;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(20, 117, 255, 0.18);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(236, 246, 255, 0.94)),
        linear-gradient(135deg, rgba(20, 117, 255, 0.08), rgba(9, 182, 79, 0.06));
      color: var(--blue);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.92);
    }

    .nav-visual svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .nav-visual::after {
      content: attr(data-state);
      position: absolute;
      right: 8px;
      bottom: 6px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--blue);
      font-size: 11px;
      font-weight: 900;
      line-height: 1.2;
      box-shadow: inset 0 0 0 1px rgba(20, 117, 255, 0.12);
    }

    .nav-visual .water-line {
      fill: none;
      stroke: #8cc8ff;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-dasharray: 28 16;
      opacity: 0.62;
      animation: waterDrift 1.7s linear infinite;
    }

    .nav-visual .water-line.w2 {
      opacity: 0.46;
      animation-duration: 2.1s;
      animation-delay: -0.4s;
    }

    .nav-visual .water-line.w3 {
      opacity: 0.34;
      animation-duration: 2.6s;
      animation-delay: -0.8s;
    }

    .nav-visual .scan-line {
      stroke: rgba(20, 117, 255, 0.2);
      stroke-width: 1;
      stroke-dasharray: 4 7;
      opacity: 0.35;
      animation: scanSweep 2.4s ease-in-out infinite;
    }

    .nav-visual .boat-group {
      transform-box: view-box;
      transform-origin: 75px 48px;
      transition: transform 220ms var(--ease);
    }

    .nav-visual .boat-hull {
      fill: url(#boatHullGradient);
      stroke: var(--boat-green-dark);
      stroke-width: 2;
      stroke-linejoin: round;
    }

    .nav-visual .boat-cabin {
      fill: #f4fff8;
      stroke: var(--boat-green-dark);
      stroke-width: 1.6;
      stroke-linejoin: round;
    }

    .nav-visual .boat-window {
      fill: #bdf5d3;
      stroke: var(--boat-green-dark);
      stroke-width: 1;
    }

    .nav-visual .boat-keel {
      fill: none;
      stroke: rgba(5, 132, 65, 0.48);
      stroke-width: 1.2;
      stroke-linecap: round;
    }

    .nav-visual .wake,
    .nav-visual .thrust {
      fill: none;
      stroke: #20a9ff;
      stroke-width: 2;
      stroke-linecap: round;
      opacity: 0.32;
      transition: opacity 180ms var(--ease), transform 180ms var(--ease);
      animation: wakePulse 1.25s ease-in-out infinite;
    }

    .nav-visual .heading-arrow {
      fill: none;
      stroke: #1475ff;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
      transition: opacity 180ms var(--ease), transform 180ms var(--ease);
    }

    .nav-left .boat-group {
      transform: translate(-7px, -1px) rotate(-18deg);
    }

    .nav-right .boat-group {
      transform: translate(7px, -1px) rotate(18deg);
    }

    .nav-forward .boat-group {
      transform: translateY(-7px);
    }

    .nav-reverse .boat-group {
      transform: translateY(7px) rotate(180deg) scale(0.96);
    }

    .nav-correct .boat-group {
      animation: correctBoat 1.2s ease-in-out infinite;
    }

    .nav-left .turn-left,
    .nav-right .turn-right,
    .nav-forward .forward-arrow,
    .nav-reverse .reverse-arrow,
    .nav-correct .correct-arrow {
      opacity: 0.95;
    }

    .nav-forward::after {
      color: var(--green);
    }

    .nav-reverse::after {
      color: var(--red);
    }

    .nav-forward .water-line,
    .nav-left .water-line,
    .nav-right .water-line {
      animation-duration: 1.15s;
    }

    .nav-reverse .water-line {
      animation-direction: reverse;
      animation-duration: 1.9s;
    }

    .nav-idle .scan-line {
      opacity: 0.72;
    }

    .nav-forward .wake,
    .nav-left .wake,
    .nav-right .wake,
    .nav-correct .wake {
      opacity: 0.72;
    }

    .nav-reverse .thrust {
      opacity: 0.75;
      transform: translateY(7px);
    }

    @keyframes waterDrift {
      to { stroke-dashoffset: -44; }
    }

    @keyframes wakePulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: -14; }
    }

    @keyframes scanSweep {
      0%, 100% { transform: translateX(-18px); opacity: 0.2; }
      50% { transform: translateX(18px); opacity: 0.82; }
    }

    @keyframes correctBoat {
      0%, 100% { transform: rotate(-7deg) translateX(-2px); }
      50% { transform: rotate(7deg) translateX(2px); }
    }

    .motor-summary {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 48px 34px;
      gap: 8px;
      align-items: center;
      padding: 22px 22px;
    }

    .motor-summary > :first-child {
      min-width: 0;
      justify-self: end;
      text-align: right;
    }

    .motor-number {
      margin-top: 14px;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 34px;
      font-weight: 900;
      color: var(--green);
    }

    .motor-number.negative {
      color: var(--red);
    }

    .mini-scale {
      height: 112px;
      display: grid;
      grid-template-rows: 1fr 1fr 1fr;
      align-items: center;
      color: #3e5680;
      font-size: 13px;
      font-family: "Cascadia Mono", Consolas, monospace;
      text-align: right;
    }

    .mini-gauge {
      width: 26px;
      height: 112px;
      position: relative;
      border-radius: 6px;
      background: #eef3fa;
      box-shadow: inset 0 0 0 1px #e2ebf6;
      overflow: hidden;
    }

    .mini-gauge::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: #becde0;
      z-index: 2;
    }

    .gauge-fill {
      position: absolute;
      left: 0;
      right: 0;
      height: 0;
      transition: height 160ms var(--ease);
    }

    .gauge-fill.positive {
      bottom: 50%;
      background: var(--green);
    }

    .gauge-fill.negative {
      top: 50%;
      background: var(--red);
    }

    .video-card {
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: #edf3f8;
      box-shadow: var(--shadow-strong);
    }

    .video-toolbar {
      position: absolute;
      z-index: 3;
      top: 16px;
      left: 18px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 7px 11px;
      border-radius: 999px;
      color: #fff;
      background: rgba(6, 18, 42, 0.36);
      backdrop-filter: blur(8px);
      font-size: 14px;
      font-weight: 800;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 0 5px rgba(20, 117, 255, 0.18);
    }

    .video-frame {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: #dce6ef;
    }

    #stream {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .bottom-card {
      display: grid;
      grid-template-columns: 1fr 1px 1.1fr 1px 0.55fr 1px 0.55fr 1px 0.95fr;
      align-items: center;
      overflow: hidden;
    }

    .bottom-metric {
      min-width: 0;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
    }

    .metric-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--blue);
      border: 1px solid rgba(20, 117, 255, 0.28);
      background: #fff;
    }

    .metric-icon svg {
      width: 23px;
      height: 23px;
      stroke-width: 2.4;
    }

    .metric-label {
      font-size: 13px;
      margin-bottom: 5px;
    }

    .metric-value {
      min-width: 0;
      color: var(--blue);
      font-size: 20px;
      font-weight: 900;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .target-lock-value {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .target-lock-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .target-picture {
      width: 30px;
      height: 30px;
      flex: 0 0 30px;
      display: grid;
      place-items: center;
      border: 1px solid #d9e7f7;
      border-radius: 9px;
      background: #f8fbff;
    }

    .target-picture.mini {
      width: 24px;
      height: 24px;
      flex-basis: 24px;
      border-radius: 7px;
    }

    .target-picture svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .target-picture.mini svg {
      width: 20px;
      height: 20px;
    }

    .target-picture.black-bag {
      background: #f1f4f8;
      border-color: #cbd5e3;
    }

    .target-picture.orange-ball {
      background: #fff6e8;
      border-color: #ffd39a;
    }

    .target-picture.yellow-duck {
      background: #fffbe6;
      border-color: #f3dc58;
    }

    .target-picture.purple-bottle {
      background: #f6f0ff;
      border-color: #d7c2ff;
    }

    .metric-value.small {
      font-family: "Cascadia Mono", Consolas, monospace;
      overflow: visible;
      text-overflow: clip;
    }

    .bottom-metric.stat-only {
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
    }

    .bottom-metric.stat-only .metric-value {
      min-width: 56px;
    }

    .metric-value.light-red {
      color: var(--red);
    }

    .metric-value.light-green {
      color: var(--green);
    }

    .metric-value.light-blue {
      color: var(--blue);
    }



    /* Exact left-screen extraction: keep the original visual rhythm and remove the right column. */
    .shell {
      grid-template-rows: 58px minmax(0, 1fr);
      gap: 8px;
      padding: 10px 14px;
    }

    .brand-logo {
      width: 46px;
      height: 46px;
    }

    h1 {
      font-size: 21px;
    }

    .chip {
      min-height: 28px;
      padding: 5px 9px;
    }

    .layout {
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
    }

    .left-stack {
      grid-template-rows: 94px minmax(0, 1fr) 68px;
      gap: 10px;
    }

    .summary-card {
      grid-template-columns: minmax(190px, 1.02fr) 1px minmax(190px, 0.86fr) 1px minmax(190px, 0.86fr);
    }

    .course-box {
      grid-template-columns: 48px minmax(0, 1fr) 112px;
      gap: 14px;
      padding: 12px 18px;
    }

    .nav-icon {
      width: 48px;
      height: 48px;
    }

    .nav-icon svg {
      width: 27px;
      height: 27px;
    }

    .summary-label {
      margin-bottom: 6px;
      font-size: 14px;
    }

    .summary-action {
      font-size: 24px;
    }

    .nav-visual {
      width: 112px;
      height: 58px;
      border-radius: 10px;
    }

    .motor-summary {
      grid-template-columns: minmax(0, 1fr) 38px 24px;
      padding: 10px 18px;
    }

    .motor-title {
      font-size: 14px;
    }

    .motor-number {
      margin-top: 8px;
      font-size: 27px;
    }

    .mini-scale,
    .mini-gauge {
      height: 72px;
    }

    .mini-gauge {
      width: 20px;
    }

    .video-card {
      min-height: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #stream {
      object-fit: contain;
      object-position: center center;
    }

    .video-frame {
      width: auto;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 4 / 3;
    }

    .bottom-card {
      grid-template-columns: minmax(160px, 1fr) 1px minmax(160px, 1.1fr) 1px minmax(84px, 0.48fr) 1px minmax(84px, 0.48fr) 1px minmax(150px, 0.88fr);
    }

    .bottom-metric {
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 10px;
      padding: 8px 14px;
    }

    .metric-icon {
      width: 28px;
      height: 28px;
    }

    .metric-icon svg {
      width: 19px;
      height: 19px;
    }

    .metric-label {
      font-size: 12px;
      margin-bottom: 3px;
    }

    .metric-value {
      font-size: 17px;
    }

    @media (max-width: 1180px) {
      body { overflow: auto; }
      .shell {
        height: auto;
        min-height: 100vh;
      }
      .left-stack {
        grid-template-rows: auto minmax(420px, 62vh) auto;
      }
    }

    @media (max-width: 760px) {
      .shell {
        padding: 14px;
        grid-template-rows: auto minmax(0, 1fr);
      }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
      h1 {
        font-size: 20px;
        white-space: normal;
      }
      .summary-card,
      .bottom-card {
        grid-template-columns: 1fr;
      }
      .summary-card .divider,
      .bottom-card .divider {
        display: none;
      }
      .course-box,
      .motor-summary,
      .bottom-metric {
        border-bottom: 1px solid var(--line);
      }
      .course-box {
        grid-template-columns: 58px minmax(0, 1fr);
      }
      .nav-visual {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }

  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="Logo.png" alt="Laker logo">
        <h1>Laker-2026年全国大学生嵌入式芯片与系统设计竞赛</h1>
      </div>
      <div class="top-status">
        <span class="chip"><span id="cameraDot" class="dot"></span><span id="cameraState">摄像头启动中</span></span>
        <span id="serialState" class="chip">硬件: --</span>
        <span id="fpsState" class="chip">0.0 FPS</span>
        <span id="tempState" class="chip">帧 0</span>
      </div>
    </header>


    <main class="layout">
      <section class="left-stack">
        <div class="summary-card">
          <div class="course-box">
            <div class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="8"></circle>
                <circle cx="12" cy="12" r="2.5"></circle>
                <path d="M12 4v5.5M4 12h5.5M14.5 12H20M12 14.5V20"></path>
              </svg>
            </div>
            <div class="course-copy">
              <div class="summary-label">自动驾驶状态</div>
              <div id="topHeading" class="summary-action">巡航搜索</div>
            </div>
            <div id="navVisual" class="nav-visual nav-idle" role="img" aria-label="航向可视化" data-state="待命">
              <svg viewBox="0 0 150 92" aria-hidden="true" focusable="false">
                <defs>
                  <linearGradient id="boatHullGradient" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#6ff0a5"></stop>
                    <stop offset="0.52" stop-color="#16c96a"></stop>
                    <stop offset="1" stop-color="#07954a"></stop>
                  </linearGradient>
                </defs>
                <path class="water-line w1" d="M-12 72 C12 62 28 80 52 70 S92 60 118 70 S152 80 168 68"></path>
                <path class="water-line w2" d="M-18 58 C8 50 28 66 52 58 S92 49 116 58 S148 68 166 57"></path>
                <path class="water-line w3" d="M-14 35 C10 29 30 41 54 35 S94 29 118 35 S148 44 166 34"></path>
                <path class="scan-line" d="M32 18 L116 74"></path>
                <path class="heading-arrow forward-arrow" d="M75 24 V9 M75 9 L66 18 M75 9 L84 18"></path>
                <path class="heading-arrow reverse-arrow" d="M75 68 V83 M75 83 L66 74 M75 83 L84 74"></path>
                <path class="heading-arrow turn-left" d="M50 22 C34 29 29 46 39 60 M39 60 L30 57 M39 60 L41 50"></path>
                <path class="heading-arrow turn-right" d="M100 22 C116 29 121 46 111 60 M111 60 L120 57 M111 60 L109 50"></path>
                <path class="heading-arrow correct-arrow" d="M43 28 C53 18 66 36 76 26 S99 18 109 30"></path>
                <g class="boat-group">
                  <path class="wake" d="M66 70 C59 77 51 81 42 82"></path>
                  <path class="wake" d="M84 70 C91 77 99 81 108 82"></path>
                  <path class="thrust" d="M64 28 C56 23 49 22 42 25"></path>
                  <path class="thrust" d="M86 28 C94 23 101 22 108 25"></path>
                  <path class="boat-hull" d="M75 18 C94 31 99 55 86 72 H64 C51 55 56 31 75 18 Z"></path>
                  <path class="boat-cabin" d="M63 47 C64 38 68 33 75 30 C82 33 86 38 87 47 L83 61 H67 Z"></path>
                  <rect class="boat-window" x="68" y="43" width="14" height="9" rx="3"></rect>
                  <path class="boat-keel" d="M75 24 V69"></path>
                </g>
              </svg>
            </div>
          </div>
          <div class="divider"></div>
          <div class="motor-summary">
            <div>
              <div class="motor-title">左电机</div>
              <div id="leftValue" class="motor-number">+0</div>
            </div>
            <div class="mini-scale"><span>+100</span><span>0</span><span>-100</span></div>
            <div class="mini-gauge" aria-hidden="true">
              <span id="leftMiniPos" class="gauge-fill positive"></span>
              <span id="leftMiniNeg" class="gauge-fill negative"></span>
            </div>
          </div>
          <div class="divider"></div>
          <div class="motor-summary">
            <div>
              <div class="motor-title">右电机</div>
              <div id="rightValue" class="motor-number">+0</div>
            </div>
            <div class="mini-scale"><span>+100</span><span>0</span><span>-100</span></div>
            <div class="mini-gauge" aria-hidden="true">
              <span id="rightMiniPos" class="gauge-fill positive"></span>
              <span id="rightMiniNeg" class="gauge-fill negative"></span>
            </div>
          </div>
        </div>

        <div class="video-card">
          <div class="video-toolbar"><span class="live-dot"></span><span>实时监控</span></div>
          <div class="video-frame">
            <img id="stream" alt="IMX219 实时视频" src="/stream.mjpg">
          </div>
        </div>

        <div class="bottom-card">
          <div class="bottom-metric">
            <div class="metric-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="6"></circle>
                <circle cx="12" cy="12" r="1.8"></circle>
                <path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path>
              </svg>
            </div>
            <div>
              <div class="metric-label">目标锁定</div>
              <div id="lockMetric" class="metric-value target-lock-value">
                <span id="lockIcon" class="target-picture none" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6.5" fill="none" stroke="#8aa0bd" stroke-width="1.8"></circle><path d="M12 5v3M12 16v3M5 12h3M16 12h3" stroke="#8aa0bd" stroke-width="1.8" stroke-linecap="round"></path></svg>
                </span>
                <span id="lockName" class="target-lock-name">未发现</span>
              </div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="bottom-metric">
            <div class="metric-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="8"></circle>
                <circle cx="12" cy="12" r="2.5"></circle>
                <path d="M12 4v5.5M4 12h5.5M14.5 12H20M12 14.5V20"></path>
              </svg>
            </div>
            <div>
              <div class="metric-label">自动驾驶状态</div>
              <div id="headingMetric" class="metric-value">巡航搜索</div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="bottom-metric stat-only">
            <div>
              <div class="metric-label">FPS</div>
              <div id="fpsMetric" class="metric-value small">0.0</div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="bottom-metric stat-only">
            <div>
              <div class="metric-label">帧</div>
              <div id="frameMetric" class="metric-value small">0</div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="bottom-metric">
            <div class="metric-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M9 18h6M10 22h4M8.5 14.5a6 6 0 1 1 7 0c-.8.6-1.5 1.4-1.8 2.5h-3.4c-.3-1.1-1-1.9-1.8-2.5Z"></path>
              </svg>
            </div>
            <div>
              <div class="metric-label">灯带状态</div>
              <div id="lightMetric" class="metric-value">关闭</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>

    const state = {
      left: 0,
      right: 0,
      lightEnabled: false,
      lightColor: "blue",
      lightHardwareStatus: "open",
      streamRetryTimer: null,
      statusTimer: null,
      statusUrl: "",
      pollMs: 700
    };

    const els = {
      stream: document.getElementById("stream"),
      cameraDot: document.getElementById("cameraDot"),
      cameraState: document.getElementById("cameraState"),
      serialState: document.getElementById("serialState"),
      fpsState: document.getElementById("fpsState"),
      tempState: document.getElementById("tempState"),
      topHeading: document.getElementById("topHeading"),
      navVisual: document.getElementById("navVisual"),
      lockIcon: document.getElementById("lockIcon"),
      lockName: document.getElementById("lockName"),
      headingMetric: document.getElementById("headingMetric"),
      fpsMetric: document.getElementById("fpsMetric"),
      frameMetric: document.getElementById("frameMetric"),
      lightMetric: document.getElementById("lightMetric"),
      leftValue: document.getElementById("leftValue"),
      rightValue: document.getElementById("rightValue"),
      leftMiniPos: document.getElementById("leftMiniPos"),
      leftMiniNeg: document.getElementById("leftMiniNeg"),
      rightMiniPos: document.getElementById("rightMiniPos"),
      rightMiniNeg: document.getElementById("rightMiniNeg")
    };

    const clamp = (value) => Math.max(-100, Math.min(100, Number(value) || 0));
    const signed = (value) => `${value >= 0 ? "+" : ""}${value}`;
    const asArray = (value) => Array.isArray(value) ? value : [];
    const safeFrame = (value) => Number.isFinite(Number(value)) ? Number(value) : 0;
    const safeColor = (value) => ["red", "green", "blue"].includes(value) ? value : "blue";

    function renderHardwareState(serial = {}) {
      const mode = serial.mode || "mock";
      const status = serial.status || "--";
      if (mode === "direct") return status === "open" ? "\u786c\u4ef6: RDK\u76f4\u63a7" : `\u786c\u4ef6: ${status}`;
      if (mode === "real") return "\u786c\u4ef6: \u4e32\u53e3\u5907\u7528";
      if (mode === "mock") return "\u786c\u4ef6: \u6a21\u62df";
      return "\u786c\u4ef6: --";
    }

    function headingVisualState(heading) {
      const text = String(heading || "");
      if (text.includes("\u5de6")) return { className: "nav-left", label: "\u5de6\u4fee\u6b63" };
      if (text.includes("\u53f3")) return { className: "nav-right", label: "\u53f3\u4fee\u6b63" };
      if (text.includes("\u540e\u9000") || text.includes("\u8131\u79bb")) return { className: "nav-reverse", label: "\u540e\u9000" };
      if (text.includes("\u524d\u8fdb") || text.includes("\u63a5\u8fd1") || text.includes("\u63a8\u8fdb")) return { className: "nav-forward", label: "\u524d\u8fdb" };
      if (text.includes("\u5fae\u8c03") || text.includes("\u7ea0\u504f") || text.includes("\u4fee\u6b63") || text.includes("\u5dee\u901f") || text.includes("\u8c03\u6574")) {
        return { className: "nav-correct", label: "\u7ea0\u504f" };
      }
      return { className: "nav-idle", label: "\u5f85\u547d" };
    }

    function renderHeadingVisual(heading) {
      const visual = headingVisualState(heading);
      els.navVisual.classList.remove("nav-left", "nav-right", "nav-forward", "nav-reverse", "nav-correct", "nav-idle");
      els.navVisual.classList.add(visual.className);
      els.navVisual.dataset.state = visual.label;
      els.navVisual.setAttribute("aria-label", `\u822a\u5411\u53ef\u89c6\u5316\uff1a${visual.label}`);
    }

    function setSignedText(element, value) {
      element.textContent = signed(value);
      element.classList.toggle("negative", value < 0);
    }

    function setGauge(posEl, negEl, value) {
      const height = `${Math.abs(value) / 2}%`;
      posEl.style.height = value > 0 ? height : "0%";
      negEl.style.height = value < 0 ? height : "0%";
    }

    function renderMotor(left, right) {
      state.left = clamp(left);
      state.right = clamp(right);
      setSignedText(els.leftValue, state.left);
      setSignedText(els.rightValue, state.right);
      setGauge(els.leftMiniPos, els.leftMiniNeg, state.left);
      setGauge(els.rightMiniPos, els.rightMiniNeg, state.right);
    }

    function targetGraphicType(label, id = "") {
      const text = `${id} ${label}`.toLowerCase();
      if (text.includes("yellow_duck") || text.includes("\u9e2d")) return "yellow-duck";
      if (text.includes("purple_bottle") || text.includes("\u74f6")) return "purple-bottle";
      if (text.includes("orange_ball") || text.includes("\u7403")) return "orange-ball";
      if (text.includes("black_bag") || text.includes("\u5851\u6599\u888b")) return "black-bag";
      return "none";
    }

    function targetIconSvg(type) {
      const icons = {
        "yellow-duck": `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#f5d329" d="M7.2 13.2c.4-3.2 2.5-5.5 5.6-5.5 2.9 0 5.2 2.1 5.8 5.1l2.3 1.1c.6.3.6 1.1 0 1.4l-2.5 1.2c-.9 2.2-3.1 3.6-6 3.6H7.1c-2.4 0-4.1-1.5-4.1-3.4 0-1.8 1.6-3.2 4.2-3.5Z"></path><circle cx="13.8" cy="10.5" r="1" fill="#172033"></circle><path fill="#ff8b12" d="M18.5 12.8h3.1c.5 0 .7.6.3.9l-2.3 1.6Z"></path></svg>`,
        "purple-bottle": `<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="3" width="6" height="4" rx="1.2" fill="#7c3cff"></rect><path fill="#9255ff" d="M8 9.2c0-1.2.9-2.2 2.1-2.2h3.8c1.2 0 2.1 1 2.1 2.2v8.9c0 1.6-1.3 2.9-2.9 2.9h-2.2A2.9 2.9 0 0 1 8 18.1Z"></path><rect x="9.6" y="11" width="4.8" height="6.6" rx="1.2" fill="#cdb7ff" opacity=".78"></rect><path d="M9.3 9.5h5.4" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity=".82"></path></svg>`,
        "orange-ball": `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.2" fill="#ff8b12"></circle><path d="M6.7 13.5c3.6-1.9 7.2-1.8 10.6.4" fill="none" stroke="#cc5f00" stroke-width="1.6" stroke-linecap="round" opacity=".65"></path><circle cx="9.2" cy="8.6" r="2.1" fill="#ffd08b" opacity=".9"></circle></svg>`,
        "black-bag": `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.2 9.4c.5-3 2.1-4.7 4.8-4.7s4.3 1.7 4.8 4.7" fill="none" stroke="#4b5563" stroke-width="1.8" stroke-linecap="round"></path><path fill="#20242b" d="M5.7 9h12.6l1.2 9.1c.2 1.6-1.1 2.9-2.7 2.9H7.2c-1.6 0-2.9-1.3-2.7-2.9Z"></path><path d="M8.3 11.2c2.1.9 5.1.9 7.4 0" fill="none" stroke="#596273" stroke-width="1.2" stroke-linecap="round" opacity=".7"></path></svg>`,
        none: `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="6.5" fill="none" stroke="#8aa0bd" stroke-width="1.8"></circle><path d="M12 5v3M12 16v3M5 12h3M16 12h3" stroke="#8aa0bd" stroke-width="1.8" stroke-linecap="round"></path></svg>`
      };
      return icons[type] || icons.none;
    }

    function setLockTarget(label, id = "") {
      const resolvedLabel = label || "\u672a\u53d1\u73b0";
      const type = targetGraphicType(resolvedLabel, id);
      els.lockIcon.className = `target-picture ${type}`;
      els.lockIcon.innerHTML = targetIconSvg(type);
      els.lockName.textContent = resolvedLabel;
    }

    function renderLight(light = {}) {
      const unavailable = light.hardware_status && !["open", "serial_mode", "mock"].includes(light.hardware_status);
      const enabled = Boolean(light.enabled);
      const color = safeColor(light.color);
      const name = { red: "\u7ea2\u8272", green: "\u7eff\u8272", blue: "\u84dd\u8272" }[color] || "\u84dd\u8272";
      els.lightMetric.textContent = unavailable ? "\u786c\u4ef6\u4e0d\u53ef\u7528" : (enabled ? `\u5f00\u542f\uff08${name}\uff09` : "\u5173\u95ed");
      els.lightMetric.classList.remove("light-red", "light-green", "light-blue");
      if (enabled && !unavailable) els.lightMetric.classList.add(`light-${color}`);
    }

    function reconnectStream(delay = 1200) {
      clearTimeout(state.streamRetryTimer);
      state.streamRetryTimer = setTimeout(() => {
        const url = new URL(els.stream.getAttribute("src") || "/stream.mjpg", window.location.href);
        url.searchParams.set("t", Date.now());
        els.stream.src = url.toString();
      }, delay);
    }

    els.stream.addEventListener("error", () => {
      els.cameraDot.className = "dot bad";
      els.cameraState.textContent = "\u89c6\u9891\u91cd\u8fde\u4e2d";
      reconnectStream();
    });

    els.stream.addEventListener("load", () => clearTimeout(state.streamRetryTimer));

    function updateLeftDashboard(data = {}) {
      const camera = data.camera || {};
      const navigation = data.navigation || {};
      const serial = data.serial || {};
      const control = data.control || {};
      const light = data.light || {};
      const detections = asArray(data.detections);
      const cameraOk = camera.status === "running" && Number(camera.last_frame_age_sec || 0) < 3;
      const fps = Number(camera.measured_fps || 0).toFixed(1);
      const frame = safeFrame(camera.frame_count);
      const heading = navigation.manual_action || navigation.heading || "\u5de1\u822a\u641c\u7d22";
      const primaryDetection = detections[0] || {};
      const primaryTarget = navigation.primary_target || primaryDetection.label || "";

      els.cameraDot.className = cameraOk ? "dot ok" : "dot bad";
      els.cameraState.textContent = cameraOk ? "\u6444\u50cf\u5934\u5728\u7ebf" : "\u6444\u50cf\u5934\u7b49\u5f85";
      els.fpsState.textContent = `${fps} FPS`;
      els.fpsMetric.textContent = fps;
      els.frameMetric.textContent = frame;
      els.tempState.textContent = `\u5e27 ${frame}`;
      els.serialState.textContent = renderHardwareState(serial);
      els.headingMetric.textContent = heading;
      els.topHeading.textContent = heading;
      renderHeadingVisual(heading);
      renderMotor(control.left, control.right);
      setLockTarget(primaryTarget, primaryDetection.id || "");
      renderLight(light);
    }

    async function pollStatusOnce() {
      if (!state.statusUrl) return;
      const response = await fetch(`${state.statusUrl}${state.statusUrl.includes("?") ? "&" : "?"}t=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`${response.status}`);
      updateLeftDashboard(await response.json());
    }

    function startStatusPolling() {
      clearInterval(state.statusTimer);
      if (!state.statusUrl) return;
      pollStatusOnce().catch(() => {});
      state.statusTimer = setInterval(() => {
        pollStatusOnce().catch(() => {
          els.cameraDot.className = "dot bad";
          els.cameraState.textContent = "\u670d\u52a1\u79bb\u7ebf";
          els.serialState.textContent = "\u786c\u4ef6: --";
          reconnectStream(1800);
        });
      }, state.pollMs);
    }

    window.LeftDashboard = {
      update: updateLeftDashboard,
      configure(options = {}) {
        if (options.streamUrl) els.stream.src = options.streamUrl;
        if (options.logoSrc) document.querySelector(".brand-logo").src = options.logoSrc;
        if (options.statusUrl !== undefined) state.statusUrl = options.statusUrl || "";
        if (options.pollMs) state.pollMs = Math.max(250, Number(options.pollMs) || 700);
        startStatusPolling();
      }
    };

    updateLeftDashboard({
      camera: { status: "running", measured_fps: 12.0, frame_count: 23214, last_frame_age_sec: 0.1 },
      serial: { mode: "direct", status: "open" },
      control: { left: 15, right: -10 },
      light: { enabled: true, color: "red", hardware_status: "open" },
      navigation: { manual_action: "\u5de6\u8f6c\u5fae\u8c03", heading: "\u5de6\u8f6c\u5fae\u8c03", primary_target: "\u5851\u6599\u888b" },
      detections: [{ id: "black_bag", label: "\u5851\u6599\u888b", confidence: 0.79 }]
    });
  </script>
</body>
</html>
